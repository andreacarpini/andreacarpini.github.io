
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Andrew Karpensky</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
      /* ── Design tokens ─────────────────────────────────── */
      :root {
        --ink:        #1A1A1A;
        --ink-2:      #6B6B6B;
        --ink-3:      #A0A0A0;
        --border-sm:  rgba(26, 26, 26, 0.09);
        --border-md:  rgba(26, 26, 26, 0.14);
        --bg:         #F9F8F6;
        --radius-pill: 999px;
        --radius-card: 14px;
      }

      /* ── Base ───────────────────────────────────────────── */
      html, body {
        overflow: hidden;
        height: 100%;
        position: fixed;
        width: 100%;
      }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Playfair Display', serif;
        background-color: var(--bg);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }
      .serif { font-family: 'Playfair Display', serif; }

      /* ── Animation ──────────────────────────────────────── */
      .fade-in { animation: fadeIn 1.2s ease-out forwards; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0);   }
      }

      /* ── Hero layout ────────────────────────────────────── */
      .hero-split {
        display: flex;
        align-items: center;
        gap: 4rem;
        width: 100%;
        max-width: 1100px;
      }
      .hero-left  { flex: 0 0 auto; }
      .hero-right {
        flex: 1 1 0;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        border: 1px dashed var(--border-md);
        border-radius: var(--radius-card);
        padding: 1.25rem;
        background-color: var(--bg);
      }

      /* ── Pills ──────────────────────────────────────────── */
      .pill-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.375rem;
      }
      .service-pill {
        display: inline-flex;
        align-items: center;
        padding: 0.3rem 0.75rem;
        border: 1px solid var(--border-sm);
        border-radius: var(--radius-pill);
        font-size: 0.75rem;      /* 12px */
        font-weight: 500;
        letter-spacing: 0.03em;
        white-space: nowrap;
        color: var(--ink);
      }
      .service-pill.more { opacity: 0.4; }

      /* ── Card footer ────────────────────────────────────── */
      .pill-footer-title {
        display: flex;
        align-items: center;
        gap: 0.625rem;
        font-size: 0.875rem;     /* 14px */
        font-weight: 500;
        letter-spacing: -0.01em;
        color: var(--ink);
      }
      .pill-footer-location {
        font-size: 0.75rem;      /* 12px */
        font-weight: 400;
        color: var(--ink-3);
        line-height: 1.3;
      }
      .pill-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        object-fit: cover;
        object-position: center 20%;
        flex-shrink: 0;
      }

      /* ── Center line ─────────────────────────────────────── */
      .center-line {
        position: fixed;
        top: 4.5rem;
        bottom: 4.5rem;
        left: 50%;
        transform: translateX(-50%);
        width: 1px;
        border-left: 1px dashed var(--border-md);
        pointer-events: none;
        z-index: 0;
      }

      /* ── Mobile ─────────────────────────────────────────── */
      @media (max-width: 640px) {
        .hero-split {
          flex-direction: column;
          align-items: flex-start;
          gap: 2rem;
        }
      }
    </style>
