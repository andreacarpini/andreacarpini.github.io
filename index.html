
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Andrew Karpensky</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='16' height='32' fill='%23000'/><rect x='16' width='16' height='32' fill='%23fff'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
      :root {
        --space-xs:  0.4rem;  /* tight inline gap: heading→content */
        --space-sm:  1rem;    /* small indent */
        --space-md:  1.5rem;  /* standard rhythm: date, h3, images */
        --space-lg:  2rem;    /* section break: h2 top, hr */
        --space-xl:  2.5rem;  /* item / stack spacing */
        --space-2xl: 3rem;    /* panel edge padding */
        --space-3xl: 6rem;    /* panel top (2 × panel-edge) */
      }
      html, body {
        overflow: hidden;
        height: 100%;
        width: 100%;
      }
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        line-height: 1.8;
        background-color: #000;
        color: #1A1A1A;
        -webkit-font-smoothing: antialiased;
      }
      .panel {
        position: absolute;
        inset: 0;
      }
      .panel-left {
        right: 50%;
      }
      .panel-right {
        left: 50%;
      }
      .name-wrap {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1;
      }
      .name-wrap-left {
        clip-path: inset(0 50% 0 0);
      }
      .name-wrap-right {
        clip-path: inset(0 0 0 50%);
      }
      .name-title {
        font-family: 'Playfair Display', serif;
        font-size: clamp(3rem, 8vw, 6rem);
        letter-spacing: -0.05em;
        line-height: 1.05;
        margin: 0;
        padding: var(--space-lg) var(--space-xl);
        white-space: nowrap;
        font-weight: 400;
      }
      .name-accent {
        font-style: italic;
      }
      .nav-link {
        font-family: 'Inter', sans-serif;
        font-weight: 400;
        font-size: 1rem;
        text-decoration: none;
        text-underline-offset: 6px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }
      @media (hover: hover) {
        .nav-link:hover {
          text-decoration: underline;
        }
      }
      .nav-link.is-open,
      .nav-link.is-pressed,
      .nav-link.is-active {
        text-decoration: underline;
      }
      button {
        font: inherit;
      }
      .contact-link,
      .links-toggle,
      .github-link {
        position: absolute;
        bottom: 20%;
        z-index: 2;
        transform: translateX(-50%);
      }
      .contact-link {
        left: 25%;
      }
      .links-toggle,
      .github-link {
        left: 75%;
      }
      .github-link {
        bottom: calc(20% - var(--space-xl));
      }
      .skills-toggle {
        position: absolute;
        top: 20%;
        left: 25%;
        z-index: 2;
        transform: translateX(-50%);
      }
      .latest-link {
        position: absolute;
        top: 20%;
        left: 75%;
        z-index: 2;
        transform: translateX(-50%);
      }
      .skills-text {
        position: absolute;
        top: calc(20% + var(--space-xl));
        left: 25%;
        z-index: 2;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        white-space: nowrap;
      }
      .skills-text p {
        margin: 0;
      }
      .is-hidden {
        display: none;
      }
      #main-screen {
        position: fixed;
        inset: 0;
        transition: transform 0.7s cubic-bezier(0.77, 0, 0.175, 1);
      }
      #blog-screen {
        position: fixed;
        inset: 0;
        transform: translateX(100%);
        transition: transform 0.7s cubic-bezier(0.77, 0, 0.175, 1);
        overflow: hidden;
      }
      #blog-panels {
        display: flex;
        width: 100%;
        height: 100%;
        font-family: 'Inter', sans-serif;
        transition: transform 0.7s cubic-bezier(0.77, 0, 0.175, 1);
      }
      #blog-list-panel {
        width: 50%;
        flex-shrink: 0;
        overflow-y: auto;
        padding: var(--space-3xl) var(--space-2xl) var(--space-2xl);
        box-sizing: border-box;
        position: relative;
      }
      #blog-content-panel {
        width: 50%;
        flex-shrink: 0;
        overflow-y: auto;
        padding: var(--space-3xl) var(--space-2xl) var(--space-2xl);
        box-sizing: border-box;
        position: relative;
      }
      .blog-back {
        position: absolute;
        top: var(--space-2xl);
        left: var(--space-2xl);
        z-index: 2;
      }
      .blog-post-item {
        display: block;
        text-align: left;
        margin-bottom: var(--space-xl);
        color: inherit;
      }
      .blog-post-item-title {
        display: block;
        font-size: 1rem;
        font-weight: 400;
        margin-bottom: var(--space-xs);
      }
      .blog-post-item.nav-link:hover,
      .blog-post-item.nav-link:active,
      .blog-post-item.nav-link.is-active {
        text-decoration: none;
      }
      .blog-post-item.is-pressed .blog-post-item-title {
        text-decoration: underline;
        text-underline-offset: 6px;
      }
      @media (hover: hover) {
        .blog-post-item:hover .blog-post-item-title,
        .blog-post-item.is-active .blog-post-item-title {
          text-decoration: underline;
          text-underline-offset: 6px;
        }
      }
      .blog-post-item-excerpt {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        font-size: 1rem;
        opacity: 0.65;
      }
      .blog-content-title {
        font-size: 1rem;
        font-weight: 400;
        margin: 0 0 var(--space-xs);
        text-decoration: underline;
      }
      .blog-content-date {
        font-size: 1rem;
        opacity: 0.65;
        margin: 0 0 var(--space-md);
      }
      .blog-content-body {
        font-size: 1rem;
        opacity: 0.65;
      }
      .blog-content-body img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: var(--space-md) 0;
      }
      .blog-content-body a {
        color: inherit;
        text-decoration: underline;
        text-underline-offset: 6px;
      }
      .blog-content-body h2:has(a),
      .blog-content-body h3:has(a) {
        text-decoration: none;
      }
      .blog-content-body h2 {
        font-size: 1rem;
        font-weight: 400;
        margin: var(--space-lg) 0 var(--space-xs);
        text-decoration: underline;
      }
      .blog-content-body h3 {
        font-size: 1rem;
        font-weight: 400;
        margin: var(--space-md) 0 var(--space-xs);
        text-decoration: underline;
      }
      .blog-content-body p {
        margin: 0 0 var(--space-sm);
      }
      .blog-content-body code {
        font-family: 'Courier New', Courier, monospace;
        font-size: 1em;
        opacity: 0.65;
        background: rgba(128,128,128,0.12);
        padding: 0.1em 0.35em;
        border-radius: 3px;
      }
      .blog-content-body blockquote {
        margin: var(--space-md) 0;
        padding-left: var(--space-sm);
        border-left: 2px solid currentColor;
        opacity: 0.65;
        font-style: italic;
      }
      .blog-content-body hr {
        border: none;
        border-top: 1px solid currentColor;
        opacity: 0.15;
        margin: var(--space-lg) 0;
      }
      #blog-content-back {
        position: absolute;
        top: var(--space-2xl);
        left: var(--space-2xl);
        z-index: 2;
        display: none;
        align-items: center;
        gap: 0;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
        max-width: calc(100% - var(--space-3xl));
      }
      #blog-bc-title {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }
      #blog-content-back .bc-sep,
      .blog-back .bc-sep {
        margin: 0 0.6em;
      }
      @media (max-width: 768px) {
        #blog-panels {
          width: 200%;
        }
        #blog-panels.showing-post {
          transform: translateX(-50%);
        }
        #blog-list-panel,
        #blog-content-panel {
          width: 50%;
        }
        #blog-content-back {
          display: flex;
        }
      }
    </style>
</head>
  <body>
    <div id="main-screen">
    <div id="left-panel" class="panel panel-left" aria-hidden="true"></div>
    <div id="right-panel" class="panel panel-right" aria-hidden="true"></div>

    <div class="name-wrap name-wrap-left" aria-hidden="true">
      <h1 id="left-name" class="name-title">
        Andrew<br /><span class="name-accent">Karpensky</span>
      </h1>
    </div>

    <div class="name-wrap name-wrap-right" aria-hidden="true">
      <h1 id="right-name" class="name-title">
        Andrew<br /><span class="name-accent">Karpensky</span>
      </h1>
    </div>

    <button id="skills-toggle" type="button" class="nav-link skills-toggle" aria-expanded="false" aria-controls="skills-text">
      Skills
    </button>
    <div id="skills-text" class="skills-text is-hidden" aria-hidden="true">
      <p>AWS, Terraform</p>
      <p>Kubernetes</p>
      <p>GitHub Actions</p>
      <p>Web Applications</p>
    </div>

    <a id="contact-link" href="mailto:bluer.mullion.0h@icloud.com" class="nav-link contact-link">
      Contact
    </a>

    <button id="latest-link" type="button" class="nav-link latest-link">
      Latest
    </button>

    <button id="links-toggle" type="button" class="nav-link links-toggle" aria-expanded="false" aria-controls="github-link">
      Links
    </button>

    <a id="github-link" href="https://github.com/andreacarpini" target="_blank" rel="noopener noreferrer" class="nav-link github-link is-hidden">
      GitHub
    </a>

    </div>

    <div id="blog-screen">
      <div id="blog-panels">
      <div id="blog-list-panel">
        <div class="blog-back">
          <button id="blog-back-btn" type="button" class="nav-link">Main</button><span class="bc-sep">·</span><button id="blog-latest-label" type="button" class="nav-link">Latest</button>
        </div>
        <nav id="blog-list" aria-label="Blog posts"></nav>
      </div>
      <div id="blog-content-panel">
        <div id="blog-content-back" aria-label="Breadcrumb navigation">
          <button id="blog-bc-main" type="button" class="nav-link">Main</button><span class="bc-sep">·</span><button id="blog-bc-latest" type="button" class="nav-link">Latest</button><span class="bc-sep">·</span><span id="blog-bc-title"></span>
        </div>
        <div id="blog-content"></div>
      </div>
      </div>
      </div>

    <script src="posts.js"></script>
    <script>
      const flipped = Math.random() < 0.5;
      const leftBg = flipped ? '#fff' : '#000';
      const rightBg = flipped ? '#000' : '#fff';
      const leftText = flipped ? '#000' : '#fff';
      const rightText = flipped ? '#fff' : '#000';

      const leftPanel = document.getElementById('left-panel');
      const rightPanel = document.getElementById('right-panel');
      const leftName = document.getElementById('left-name');
      const rightName = document.getElementById('right-name');
      const contactLink = document.getElementById('contact-link');
      const linksToggle = document.getElementById('links-toggle');
      const githubLink = document.getElementById('github-link');
      const latestLink = document.getElementById('latest-link');
      const skillsToggle = document.getElementById('skills-toggle');
      const skillsText = document.getElementById('skills-text');
      const skillItems = skillsText ? skillsText.querySelectorAll('p') : [];
      const mainScreen = document.getElementById('main-screen');
      const blogScreen = document.getElementById('blog-screen');
      const blogBack = document.getElementById('blog-back-btn');
      const blogBackLabel = document.getElementById('blog-latest-label');
      const blogPanels = document.getElementById('blog-panels');
      const blogContentBack = document.getElementById('blog-content-back');
      const blogBcMain = document.getElementById('blog-bc-main');
      const blogBcLatest = document.getElementById('blog-bc-latest');
      const blogBcTitle = document.getElementById('blog-bc-title');
      const blogListPanel = document.getElementById('blog-list-panel');
      const blogContentPanel = document.getElementById('blog-content-panel');
      const blogList = document.getElementById('blog-list');
      const blogContent = document.getElementById('blog-content');
      let activeTouchLink = null;

      leftPanel.style.background = leftBg;
      rightPanel.style.background = rightBg;
      leftName.style.color = leftText;
      rightName.style.color = rightText;
      contactLink.style.color = leftText;
      linksToggle.style.color = rightText;
      githubLink.style.color = rightText;
      latestLink.style.color = rightText;
      skillsToggle.style.color = leftText;
      skillItems.forEach(function (item) {
        item.style.color = leftText;
      });

      blogListPanel.style.background = leftBg;
      blogListPanel.style.color = leftText;
      blogBack.style.color = leftText;
      blogBackLabel.style.color = leftText;
      blogBcMain.style.color = rightText;
      blogBcLatest.style.color = rightText;
      blogBcTitle.style.color = rightText;
      blogContentPanel.style.background = rightBg;
      blogContentPanel.style.color = rightText;

      function parseMarkdown(text) {
        var escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        // block-level: process line by line first, then group into paragraphs
        var lines = escaped.trim().split('\n');
        var blocks = [];
        var paraLines = [];
        function flushPara() {
          if (paraLines.length) {
            var content = paraLines.join(' ')
              .replace(/!\[([^\]]*?)\]\(([^)]+?)\)/g, '<img src="$2" alt="$1">')
              .replace(/\[([^\]]+?)\]\(([^)]+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
              .replace(/`([^`]+?)`/g, '<code>$1</code>')
              .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
              .replace(/\*(.+?)\*/g, '<em>$1</em>');
            blocks.push('<p>' + content + '</p>');
            paraLines = [];
          }
        }
        lines.forEach(function(line) {
          var m;
          if (/^\s*$/.test(line)) {
            flushPara();
          } else if ((m = line.match(/^##\s+(.+)/))) {
            flushPara(); blocks.push('<h2>' + m[1] + '</h2>');
          } else if ((m = line.match(/^###\s+(.+)/))) {
            flushPara(); blocks.push('<h3>' + m[1] + '</h3>');
          } else if ((m = line.match(/^>\s?(.*)/))) {
            flushPara(); blocks.push('<blockquote>' + m[1] + '</blockquote>');
          } else if (/^---+$/.test(line.trim())) {
            flushPara(); blocks.push('<hr>');
          } else {
            paraLines.push(line.trim());
          }
        });
        flushPara();
        return blocks.join('');
      }

      function getExcerpt(text) {
        return text
          .replace(/!\[[^\]]*\]\([^)]+\)/g, '')
          .replace(/\[[^\]]+\]\([^)]+\)/g, function(m) { return m.match(/\[([^\]]+)\]/)[1]; })
          .replace(/#{1,3}\s+/g, '')
          .replace(/^>\s?/gm, '')
          .replace(/`([^`]+)`/g, '$1')
          .replace(/\*\*/g, '').replace(/\*/g, '')
          .replace(/^---+$/gm, '')
          .replace(/\s+/g, ' ').trim();
      }

      function openPost(index, silent) {
        var post = posts[index];
        blogList.querySelectorAll('.blog-post-item').forEach(function(btn, i) {
          btn.classList.toggle('is-active', i === index);
        });
        blogContent.innerHTML = '<h2 class="blog-content-title">' + post.title.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</h2><p class="blog-content-date">' + post.date.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</p><div class="blog-content-body">' + parseMarkdown(post.body) + '</div>';
        blogBcTitle.textContent = post.title;
        if (!silent && window.innerWidth <= 768) {
          blogPanels.classList.add('showing-post');
          blogContentPanel.scrollTop = 0;
        }
      }

      posts.forEach(function(post, i) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'nav-link blog-post-item';
        var safeTitle = post.title.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var excerpt = getExcerpt(post.body);
        btn.innerHTML = '<span class="blog-post-item-title">' + safeTitle + '</span><span class="blog-post-item-excerpt">' + excerpt + '</span>';
        btn.addEventListener('click', function() { openPost(i); });
        blogList.appendChild(btn);
      });

      if (window.innerWidth > 768) { openPost(0, true); }

      function closeLinks() {
        githubLink.classList.add('is-hidden');
        linksToggle.classList.remove('is-open');
        linksToggle.setAttribute('aria-expanded', 'false');
      }

      function openLinks() {
        githubLink.classList.remove('is-hidden');
        linksToggle.classList.add('is-open');
        linksToggle.setAttribute('aria-expanded', 'true');
      }

      function closeSkills() {
        skillsText.classList.add('is-hidden');
        skillsText.setAttribute('aria-hidden', 'true');
        skillsToggle.classList.remove('is-open');
        skillsToggle.setAttribute('aria-expanded', 'false');
      }

      function openSkills() {
        skillsText.classList.remove('is-hidden');
        skillsText.setAttribute('aria-hidden', 'false');
        skillsToggle.classList.add('is-open');
        skillsToggle.setAttribute('aria-expanded', 'true');
      }

      function setTouchLink(nextLink) {
        if (activeTouchLink === nextLink) {
          return;
        }

        if (activeTouchLink) {
          activeTouchLink.classList.remove('is-pressed');
        }

        activeTouchLink = nextLink;

        if (activeTouchLink) {
          activeTouchLink.classList.add('is-pressed');
        }
      }

      function updateTouchLink(touch) {
        const hoveredElement = document.elementFromPoint(touch.clientX, touch.clientY);
        const nextLink = hoveredElement ? hoveredElement.closest('.nav-link') : null;
        setTouchLink(nextLink);
      }

      function clearTouchLink() {
        setTouchLink(null);
      }

      linksToggle.addEventListener('click', function () {
        const isOpen = !githubLink.classList.contains('is-hidden');
        if (isOpen) {
          closeLinks();
          return;
        }
        openLinks();
      });

      skillsToggle.addEventListener('click', function () {
        const isOpen = !skillsText.classList.contains('is-hidden');
        if (isOpen) {
          closeSkills();
          return;
        }
        openSkills();
      });

      latestLink.addEventListener('click', function () {
        closeLinks();
        closeSkills();
        mainScreen.style.transform = 'translateX(-100%)';
        blogScreen.style.transform = 'translateX(0)';
        blogBackLabel.classList.add('is-active');
      });

      blogBack.addEventListener('click', function () {
        mainScreen.style.transform = '';
        blogScreen.style.transform = '';
        blogBackLabel.classList.remove('is-active');
      });

      blogBackLabel.addEventListener('click', function () {
        blogList.querySelectorAll('.blog-post-item').forEach(function(btn) {
          btn.classList.remove('is-active');
        });
        blogPanels.classList.remove('showing-post');
        blogContent.innerHTML = '';
        blogBcTitle.textContent = '';
        blogListPanel.scrollTop = 0;
      });

      blogContentBack.addEventListener('click', function () {
        blogPanels.classList.remove('showing-post');
      });

      blogBcMain.addEventListener('click', function (event) {
        event.stopPropagation();
        mainScreen.style.transform = '';
        blogScreen.style.transform = '';
        blogScreen.addEventListener('transitionend', function handler() {
          blogPanels.classList.remove('showing-post');
          blogScreen.removeEventListener('transitionend', handler);
        });
      });

      blogBcLatest.addEventListener('click', function (event) {
        event.stopPropagation();
        blogPanels.classList.remove('showing-post');
      });

      document.addEventListener('mousedown', function (event) {
        if (
          linksToggle.contains(event.target) ||
          githubLink.contains(event.target) ||
          skillsToggle.contains(event.target) ||
          skillsText.contains(event.target)
        ) {
          return;
        }

        closeLinks();
        closeSkills();
      });

      document.addEventListener('touchstart', function (event) {
        if (event.touches.length !== 1) {
          clearTouchLink();
          return;
        }

        updateTouchLink(event.touches[0]);
      }, { passive: true });

      document.addEventListener('touchmove', function (event) {
        if (event.touches.length !== 1) {
          clearTouchLink();
          return;
        }

        updateTouchLink(event.touches[0]);
      }, { passive: true });

      document.addEventListener('touchend', function () {
        // keep is-pressed until next touchstart, mirrors iOS sticky hover
      }, { passive: true });
      document.addEventListener('touchcancel', clearTouchLink, { passive: true });
    </script>
  </body>
</html>
