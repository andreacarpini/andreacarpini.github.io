
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Andrew Karpensky</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='16' height='32' fill='%23000'/><rect x='16' width='16' height='32' fill='%23fff'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
      html, body {
        overflow: hidden;
        height: 100%;
        width: 100%;
      }
      body {
        margin: 0;
        font-family: 'Playfair Display', serif;
        background-color: #000;
        color: #1A1A1A;
        -webkit-font-smoothing: antialiased;
      }
      .panel {
        position: fixed;
        inset: 0;
      }
      .panel-left {
        right: 50%;
      }
      .panel-right {
        left: 50%;
      }
      .name-wrap {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1;
      }
      .name-wrap-left {
        clip-path: inset(0 50% 0 0);
      }
      .name-wrap-right {
        clip-path: inset(0 0 0 50%);
      }
      .name-title {
        font-family: 'Playfair Display', serif;
        font-size: clamp(3rem, 8vw, 6rem);
        letter-spacing: -0.05em;
        line-height: 1.05;
        margin: 0;
        padding: 2rem 2.5rem;
        white-space: nowrap;
        font-weight: 400;
      }
      .name-accent {
        font-style: italic;
      }
      .nav-link {
        font-family: 'Playfair Display', serif;
        font-weight: 400;
        font-size: 1rem;
        text-decoration: none;
        text-underline-offset: 6px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }
      .nav-link:hover,
      .nav-link:active,
      .nav-link.is-pressed,
      .nav-link.is-open {
        text-decoration: underline;
      }
      button {
        font: inherit;
      }
      .contact-link,
      .links-toggle,
      .github-link {
        position: fixed;
        bottom: 20%;
        z-index: 2;
        transform: translateX(-50%);
      }
      .contact-link {
        left: 25%;
      }
      .links-toggle,
      .github-link {
        left: 75%;
        font-style: italic;
      }
      .github-link {
        bottom: calc(20% - 2.5rem);
      }
      .is-hidden {
        display: none;
      }
    </style>
</head>
  <body>
    <div id="left-panel" class="panel panel-left" aria-hidden="true"></div>
    <div id="right-panel" class="panel panel-right" aria-hidden="true"></div>

    <div class="name-wrap name-wrap-left" aria-hidden="true">
      <h1 id="left-name" class="name-title">
        Andrew<br /><span class="name-accent">Karpensky</span>
      </h1>
    </div>

    <div class="name-wrap name-wrap-right" aria-hidden="true">
      <h1 id="right-name" class="name-title">
        Andrew<br /><span class="name-accent">Karpensky</span>
      </h1>
    </div>

    <a id="contact-link" href="mailto:bluer.mullion.0h@icloud.com" class="nav-link contact-link">
      Contact
    </a>

    <button id="links-toggle" type="button" class="nav-link links-toggle" aria-expanded="false" aria-controls="github-link">
      Links
    </button>

    <a id="github-link" href="https://github.com/andreacarpini" target="_blank" rel="noopener noreferrer" class="nav-link github-link is-hidden">
      GitHub
    </a>

    <script>
      const flipped = Math.random() < 0.5;
      const leftBg = flipped ? '#fff' : '#000';
      const rightBg = flipped ? '#000' : '#fff';
      const leftText = flipped ? '#000' : '#fff';
      const rightText = flipped ? '#fff' : '#000';

      const leftPanel = document.getElementById('left-panel');
      const rightPanel = document.getElementById('right-panel');
      const leftName = document.getElementById('left-name');
      const rightName = document.getElementById('right-name');
      const contactLink = document.getElementById('contact-link');
      const linksToggle = document.getElementById('links-toggle');
      const githubLink = document.getElementById('github-link');
      let activeTouchLink = null;

      leftPanel.style.background = leftBg;
      rightPanel.style.background = rightBg;
      leftName.style.color = leftText;
      rightName.style.color = rightText;
      contactLink.style.color = leftText;
      linksToggle.style.color = rightText;
      githubLink.style.color = rightText;

      function closeLinks() {
        githubLink.classList.add('is-hidden');
        linksToggle.classList.remove('is-open');
        linksToggle.setAttribute('aria-expanded', 'false');
      }

      function openLinks() {
        githubLink.classList.remove('is-hidden');
        linksToggle.classList.add('is-open');
        linksToggle.setAttribute('aria-expanded', 'true');
      }

      function setTouchLink(nextLink) {
        if (activeTouchLink === nextLink) {
          return;
        }

        if (activeTouchLink) {
          activeTouchLink.classList.remove('is-pressed');
        }

        activeTouchLink = nextLink;

        if (activeTouchLink) {
          activeTouchLink.classList.add('is-pressed');
        }
      }

      function updateTouchLink(touch) {
        const hoveredElement = document.elementFromPoint(touch.clientX, touch.clientY);
        const nextLink = hoveredElement ? hoveredElement.closest('.nav-link') : null;
        setTouchLink(nextLink);
      }

      function clearTouchLink() {
        setTouchLink(null);
      }

      linksToggle.addEventListener('click', function () {
        const isOpen = !githubLink.classList.contains('is-hidden');
        if (isOpen) {
          closeLinks();
          return;
        }
        openLinks();
      });

      document.addEventListener('mousedown', function (event) {
        if (
          linksToggle.contains(event.target) ||
          githubLink.contains(event.target)
        ) {
          return;
        }

        closeLinks();
      });

      document.addEventListener('touchstart', function (event) {
        if (event.touches.length !== 1) {
          clearTouchLink();
          return;
        }

        updateTouchLink(event.touches[0]);
      }, { passive: true });

      document.addEventListener('touchmove', function (event) {
        if (event.touches.length !== 1) {
          clearTouchLink();
          return;
        }

        updateTouchLink(event.touches[0]);
      }, { passive: true });

      document.addEventListener('touchend', clearTouchLink, { passive: true });
      document.addEventListener('touchcancel', clearTouchLink, { passive: true });
    </script>
  </body>
</html>
